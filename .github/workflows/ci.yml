name: CI

# Gate before deploy. Railway auto-builds on push to main; turning on
# "Wait for CI" in the Railway service settings makes a red run here block
# the deploy. A typo (TDZ) once 502'd prod — this is the net for that.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test
