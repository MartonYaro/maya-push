<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0908;}
  .ava{width:100vw;height:100vh;position:relative;overflow:hidden;
    background:radial-gradient(circle at 50% 44%, #123a28 0%, #0a0908 58%);}
  .ring{position:absolute;inset:0;margin:auto;width:380px;height:380px;border-radius:50%;
    border:2px solid rgba(58,255,159,0.18);box-shadow:0 0 60px rgba(58,255,159,0.10) inset;}
  .ring2{position:absolute;inset:0;margin:auto;width:300px;height:300px;border-radius:50%;
    border:1px solid rgba(58,255,159,0.10);}
  .glyph{position:absolute;inset:0;margin:auto;width:230px;height:230px;
    filter:drop-shadow(0 0 26px rgba(58,255,159,0.55));}
</style></head>
<body>
  <div class="ava">
    <div class="ring"></div>
    <div class="ring2"></div>
    <svg class="glyph" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <g fill="#3aff9f">
        <path d="M16 4 L11 9 L13 9 L13 12 L9 12 L9 16 L5 16 L5 20 L1 20 L1 24 L31 24 L31 20 L27 20 L27 16 L23 16 L23 12 L19 12 L19 9 L21 9 Z"/>
        <path d="M14 14 L14 22 L18 22 L18 14 Z" fill="#0a0908"/>
        <path d="M11 14 L16 9 L21 14 Z" fill="#0a0908"/>
      </g>
    </svg>
  </div>
</body></html>
