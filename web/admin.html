<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYA Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0908; --bg-2: #11100e; --bg-3: #181614; --bg-card: #131210;
    --ink: #f0ead8; --ink-2: #b8b0a0; --ink-3: #6a6358;
    --jade: #3aff9f; --jade-soft: rgba(58,255,159,0.08);
    --red: #d44a3a; --warn: #ffb84d;
    --line: rgba(240,234,216,0.08); --line-2: rgba(240,234,216,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--ink); font-family: 'Archivo', sans-serif; padding: 32px; }
  a { color: var(--jade); text-decoration: none; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 28px; }
  .grid { display: grid; gap: 28px; }
  .card { background: var(--bg-card); border: 1px solid var(--line); padding: 22px; }
  .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .card h2 .badge { background: var(--jade); color: var(--bg); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  th { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  tr:hover td { background: var(--bg-3); }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .pos { color: var(--jade); font-weight: 600; }
  .neg { color: var(--red); font-weight: 600; }
  .pill { display: inline-block; padding: 2px 8px; font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid var(--line-2); }
  .pill.pending { color: var(--warn); border-color: var(--warn); }
  .pill.done { color: var(--jade); border-color: var(--jade); }
  .pill.rejected { color: var(--red); border-color: var(--red); }
  .btn { font-family: inherit; font-size: 12px; padding: 6px 12px; border: 1px solid var(--line-2); background: transparent; color: var(--ink); cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--jade); color: var(--jade); }
  .btn.primary { background: var(--jade); color: var(--bg); border-color: var(--jade); font-weight: 600; }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  .btn + .btn { margin-left: 6px; }
  .auth { max-width: 360px; margin: 80px auto; }
  .auth input { width: 100%; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--line-2); color: var(--ink); font-family: inherit; font-size: 14px; margin-bottom: 12px; }
  .auth input:focus { outline: none; border-color: var(--jade); }
  .empty { padding: 32px; text-align: center; color: var(--ink-3); font-size: 13px; }
  .err { color: var(--red); font-size: 13px; padding: 8px 0; }
  .top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; }
  .logout { font-size: 12px; color: var(--ink-3); cursor: pointer; }
  .logout:hover { color: var(--red); }
</style>
</head>
<body>

<div id="auth" class="auth" style="display:none">
  <h1>MAYA <span style="color:var(--jade)">Admin</span></h1>
  <div class="sub">— только для администраторов —</div>
  <input id="email" type="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button class="btn primary" style="width:100%; padding:12px" onclick="login()">Войти</button>
  <div class="err" id="err"></div>
</div>

<div id="panel" style="display:none">
  <div class="top">
    <div>
      <h1>MAYA <span style="color:var(--jade)">Admin</span></h1>
      <div class="sub">/ управление платформой</div>
    </div>
    <div class="logout" onclick="logout()">выйти →</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Заявки на пополнение <span class="badge" id="pendingCount">0</span></h2>
      <div id="pendingTable"></div>
    </div>

    <div class="card">
      <h2>Все транзакции (200 последних)</h2>
      <div id="txTable"></div>
    </div>

    <div class="card">
      <h2>Пользователи <span class="badge" id="usersCount">0</span></h2>
      <div id="usersTable"></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const fmt = (n) => (n >= 0 ? '+' : '') + '$' + Number(n || 0).toFixed(2);
const fmtTs = (ts) => new Date(ts).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

async function login() {
  const e = $('email').value.trim(), p = $('password').value;
  $('err').textContent = '';
  try {
    const r = await MayaAPI.login(e, p);
    MayaAPI.setToken(r.token);
    await enter();
  } catch (err) {
    $('err').textContent = 'Ошибка входа: ' + err.message;
  }
}

function logout() {
  MayaAPI.setToken('');
  $('panel').style.display = 'none';
  $('auth').style.display = 'block';
}

async function enter() {
  // verify admin
  try {
    await fetch('/api/admin/users', { headers: { Authorization: 'Bearer ' + MayaAPI.getToken() } })
      .then(r => { if (r.status === 403) throw new Error('not_admin'); if (!r.ok) throw new Error('http_' + r.status); });
  } catch (e) {
    $('err').textContent = e.message === 'not_admin'
      ? 'Этот пользователь не админ. Запустите: npm run admin promote <email>'
      : 'Ошибка: ' + e.message;
    return;
  }
  $('auth').style.display = 'none';
  $('panel').style.display = 'block';
  refresh();
  setInterval(refresh, 5000);
}

async function refresh() {
  try {
    const [pending, all, users] = await Promise.all([
      fetch('/api/admin/transactions?status=pending', { headers: { Authorization: 'Bearer ' + MayaAPI.getToken() } }).then(r => r.json()),
      fetch('/api/admin/transactions',                  { headers: { Authorization: 'Bearer ' + MayaAPI.getToken() } }).then(r => r.json()),
      fetch('/api/admin/users',                         { headers: { Authorization: 'Bearer ' + MayaAPI.getToken() } }).then(r => r.json()),
    ]);
    renderPending(pending.transactions || []);
    renderTx(all.transactions || []);
    renderUsers(users.users || []);
  } catch (e) { console.error(e); }
}

function renderPending(rows) {
  $('pendingCount').textContent = rows.length;
  if (!rows.length) { $('pendingTable').innerHTML = '<div class="empty">Нет заявок в ожидании</div>'; return; }
  $('pendingTable').innerHTML = `<table>
    <thead><tr><th>id</th><th>дата</th><th>пользователь</th><th>сумма</th><th>описание</th><th></th></tr></thead>
    <tbody>${rows.map(t => `<tr>
      <td class="mono">#${t.id}</td>
      <td class="mono">${fmtTs(t.created_at)}</td>
      <td>${esc(t.email)} <span style="color:var(--ink-3); font-size:11px">/ ${esc(t.name)}</span></td>
      <td class="mono ${t.amount > 0 ? 'pos' : 'neg'}">${fmt(t.amount)}</td>
      <td>${esc(t.description)}</td>
      <td>
        <button class="btn primary" onclick="confirmTx(${t.id})">Подтвердить</button>
        <button class="btn danger" onclick="rejectTx(${t.id})">Отклонить</button>
      </td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderTx(rows) {
  if (!rows.length) { $('txTable').innerHTML = '<div class="empty">Нет транзакций</div>'; return; }
  $('txTable').innerHTML = `<table>
    <thead><tr><th>id</th><th>дата</th><th>пользователь</th><th>тип</th><th>сумма</th><th>описание</th><th>статус</th></tr></thead>
    <tbody>${rows.map(t => `<tr>
      <td class="mono">#${t.id}</td>
      <td class="mono">${fmtTs(t.created_at)}</td>
      <td>${esc(t.email)}</td>
      <td class="mono">${esc(t.type)}</td>
      <td class="mono ${t.amount > 0 ? 'pos' : t.amount < 0 ? 'neg' : ''}">${t.amount === 0 ? '—' : fmt(t.amount)}</td>
      <td>${esc(t.description)}</td>
      <td><span class="pill ${esc(t.status)}">${esc(t.status)}</span></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderUsers(rows) {
  $('usersCount').textContent = rows.length;
  if (!rows.length) { $('usersTable').innerHTML = '<div class="empty">Нет пользователей</div>'; return; }
  $('usersTable').innerHTML = `<table>
    <thead><tr><th>id</th><th>email</th><th>имя</th><th>роль</th><th>баланс</th><th>прилож.</th><th>создан</th></tr></thead>
    <tbody>${rows.map(u => `<tr>
      <td class="mono">#${u.id}</td>
      <td>${esc(u.email)}</td>
      <td>${esc(u.name)}</td>
      <td><span class="pill ${u.role === 'admin' ? 'done' : ''}">${esc(u.role)}</span></td>
      <td class="mono pos">${fmt(u.balance)}</td>
      <td class="mono">${u.apps_count}</td>
      <td class="mono">${fmtTs(u.created_at)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

async function confirmTx(id) {
  try {
    await fetch('/api/admin/transactions/' + id + '/confirm', { method: 'POST', headers: { Authorization: 'Bearer ' + MayaAPI.getToken() } });
    refresh();
  } catch (e) { alert('Ошибка: ' + e.message); }
}
async function rejectTx(id) {
  if (!confirm('Отклонить транзакцию #' + id + '?')) return;
  try {
    await fetch('/api/admin/transactions/' + id + '/reject', { method: 'POST', headers: { Authorization: 'Bearer ' + MayaAPI.getToken() } });
    refresh();
  } catch (e) { alert('Ошибка: ' + e.message); }
}

(function init() {
  if (MayaAPI.isAuthed()) enter().catch(() => { $('auth').style.display = 'block'; });
  else $('auth').style.display = 'block';
})();
</script>
</body>
</html>
